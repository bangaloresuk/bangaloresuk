<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jayguru — Bangalore SUK</title>

  <!-- ── PERFORMANCE: DNS + TLS handshake done before CSS request fires ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- ── PERFORMANCE: Load fonts non-blocking (media trick) ── -->
  <!-- Only 2 weights each instead of 4 — covers all real usage -->
  <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  </noscript>

  <!-- ── PERFORMANCE: Critical styles inlined — zero extra network round-trip ── -->
  <style>
    /* Splash visible immediately, no FOUC */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #0a0520;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
    }
    /* Fallback font stack so text renders before Cinzel downloads */
    .splash-jayguru {
      font-family: Cinzel, 'Palatino Linotype', Georgia, serif;
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      color: #ffc840;
      letter-spacing: 0.15em;
      text-shadow: 0 0 40px rgba(255,200,64,0.7);
      margin: 0.25em 0;
    }
    .splash-suk {
      font-family: Lato, Arial, sans-serif;
      font-size: clamp(0.85rem, 2.2vw, 1.1rem);
      color: rgba(255,220,150,0.85);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-bottom: 1.6em;
    }
    .splash-lotus {
      font-size: clamp(2.5rem, 8vw, 4rem);
      animation: pulse 2.5s ease-in-out infinite;
      /* will-change so browser promotes to its own layer */
      will-change: transform, opacity;
    }
    .splash-ornament {
      display: flex; align-items: center; gap: 0.6em;
      color: rgba(255,200,80,0.6);
      font-size: 0.8rem;
      margin-bottom: 0.6em;
    }
    .splash-ornament-line {
      width: clamp(40px, 8vw, 80px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,200,80,0.5), transparent);
    }
    .splash-bar-wrap {
      width: clamp(140px, 30vw, 220px);
      height: 3px;
      background: rgba(255,200,80,0.15);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 1.8em;
    }
    .splash-bar {
      height: 100%;
      background: linear-gradient(90deg, #ffc840, #fff5c0, #ffc840);
      border-radius: 2px;
      animation: progress 2.2s cubic-bezier(.4,0,.2,1) forwards;
      will-change: width;
    }

    /* ── Light beam background — CSS only, no DOM spam ── */
    .splash-beams {
      position: absolute; inset: 0; pointer-events: none;
      background:
        conic-gradient(from -10deg at 30% 0%, transparent 3deg, rgba(255,200,80,0.04) 5deg, transparent 8deg),
        conic-gradient(from 5deg  at 50% 0%, transparent 3deg, rgba(255,200,80,0.05) 5deg, transparent 8deg),
        conic-gradient(from -5deg at 70% 0%, transparent 3deg, rgba(255,200,80,0.04) 5deg, transparent 8deg);
      animation: beamFade 3s ease-in-out infinite alternate;
      will-change: opacity;
    }

    /* ── Canvas-based petals (replaces 40 individual divs) ── */
    #petalCanvas {
      position: absolute; inset: 0;
      pointer-events: none;
      /* Compositor-only — no layout/paint on each frame */
      will-change: transform;
    }

    /* ── Rings — 3 CSS animations on lightweight divs ── */
    .splash-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(255,200,80,0.18);
      animation: ringExpand 4s ease-out infinite;
      will-change: transform, opacity;
    }
    .splash-ring:nth-child(2) { animation-delay: 1.4s; }
    .splash-ring:nth-child(3) { animation-delay: 2.8s; }

    /* ── Mandala: will-change promotes to GPU layer ── */
    .mandala, .mandala2 {
      position: fixed;
      top: 50%; left: 50%;
      translate: -50% -50%;
      pointer-events: none;
      opacity: 0.12;
      will-change: transform; /* GPU layer — compositor-only animation */
    }
    .mandala  { width: min(90vw, 90vh); animation: spin  28s linear infinite; }
    .mandala2 { width: min(65vw, 65vh); animation: spin2 20s linear infinite; }

    .divine-bg {
      position: fixed; inset: 0; z-index: -2;
      background: radial-gradient(ellipse at 50% 30%, #1a0a40 0%, #07021a 70%);
    }

    /* ── Keyframes ── */
    @keyframes pulse {
      0%,100% { transform: scale(1);   opacity: 1; }
      50%      { transform: scale(1.1); opacity: 0.85; }
    }
    @keyframes progress {
      from { width: 0; }
      to   { width: 100%; }
    }
    @keyframes beamFade {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }
    @keyframes ringExpand {
      0%   { transform: scale(0.4); opacity: 0.7; }
      100% { transform: scale(2.4); opacity: 0; }
    }
    @keyframes spin  { to { transform: translate(-50%,-50%) rotate(360deg); } }
    @keyframes spin2 { to { transform: translate(-50%,-50%) rotate(-360deg); } }

    /* ── Respect reduced-motion preference ── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <!-- ── SPLASH SCREEN ── -->
  <div id="splash">
    <!-- Single CSS conic-gradient element replaces 5 beam divs -->
    <div class="splash-beams"></div>

    <!-- 3 rings (was 3 — kept same, they're cheap) -->
    <div class="splash-ring" style="width:170px;height:170px"></div>
    <div class="splash-ring" style="width:170px;height:170px"></div>
    <div class="splash-ring" style="width:170px;height:170px"></div>

    <!-- Canvas replaces 40 individual petal divs -->
    <canvas id="petalCanvas"></canvas>

    <div class="splash-lotus">🪷</div>
    <div class="splash-jayguru">Jayguru</div>
    <div class="splash-ornament">
      <div class="splash-ornament-line"></div>
      <span>✦ 🙏 ✦</span>
      <div class="splash-ornament-line"></div>
    </div>
    <div class="splash-suk" id="splashSukName">Satsang Upayojana Kendra</div>
    <div class="splash-bar-wrap">
      <div class="splash-bar"></div>
    </div>
  </div>

  <!-- Background -->
  <div class="divine-bg"></div>

  <!-- Outer mandala — GPU-composited via will-change -->
  <svg class="mandala" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#1d4ed8" stroke-width="0.7" transform="translate(250,250)">
      <circle r="240"/><circle r="210"/><circle r="180"/><circle r="150"/><circle r="110"/><circle r="70"/><circle r="36"/>
      <ellipse rx="28" ry="95" transform="rotate(0)"/>
      <ellipse rx="28" ry="95" transform="rotate(30)"/>
      <ellipse rx="28" ry="95" transform="rotate(60)"/>
      <ellipse rx="28" ry="95" transform="rotate(90)"/>
      <ellipse rx="28" ry="95" transform="rotate(120)"/>
      <ellipse rx="28" ry="95" transform="rotate(150)"/>
      <ellipse rx="16" ry="55" transform="rotate(15)"/>
      <ellipse rx="16" ry="55" transform="rotate(45)"/>
      <ellipse rx="16" ry="55" transform="rotate(75)"/>
      <ellipse rx="16" ry="55" transform="rotate(105)"/>
      <ellipse rx="16" ry="55" transform="rotate(135)"/>
      <ellipse rx="16" ry="55" transform="rotate(165)"/>
      <line x1="0" y1="-240" x2="0" y2="240"/>
      <line x1="0" y1="-240" x2="0" y2="240" transform="rotate(30)"/>
      <line x1="0" y1="-240" x2="0" y2="240" transform="rotate(60)"/>
      <line x1="0" y1="-240" x2="0" y2="240" transform="rotate(90)"/>
      <line x1="0" y1="-240" x2="0" y2="240" transform="rotate(120)"/>
      <line x1="0" y1="-240" x2="0" y2="240" transform="rotate(150)"/>
      <polygon points="0,-190 24,-166 0,-142 -24,-166" transform="rotate(0)"/>
      <polygon points="0,-190 24,-166 0,-142 -24,-166" transform="rotate(30)"/>
      <polygon points="0,-190 24,-166 0,-142 -24,-166" transform="rotate(60)"/>
      <polygon points="0,-190 24,-166 0,-142 -24,-166" transform="rotate(90)"/>
      <polygon points="0,-190 24,-166 0,-142 -24,-166" transform="rotate(120)"/>
      <polygon points="0,-190 24,-166 0,-142 -24,-166" transform="rotate(150)"/>
      <polygon points="0,-190 24,-166 0,-142 -24,-166" transform="rotate(180)"/>
      <polygon points="0,-190 24,-166 0,-142 -24,-166" transform="rotate(210)"/>
      <polygon points="0,-190 24,-166 0,-142 -24,-166" transform="rotate(240)"/>
      <polygon points="0,-190 24,-166 0,-142 -24,-166" transform="rotate(270)"/>
      <polygon points="0,-190 24,-166 0,-142 -24,-166" transform="rotate(300)"/>
      <polygon points="0,-190 24,-166 0,-142 -24,-166" transform="rotate(330)"/>
    </g>
  </svg>

  <!-- Inner counter-rotating mandala -->
  <svg class="mandala2" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#3b82f6" stroke-width="0.8" transform="translate(250,250)">
      <circle r="220"/><circle r="170"/><circle r="120"/><circle r="70"/><circle r="30"/>
      <ellipse rx="22" ry="80" transform="rotate(0)"/>
      <ellipse rx="22" ry="80" transform="rotate(45)"/>
      <ellipse rx="22" ry="80" transform="rotate(90)"/>
      <ellipse rx="22" ry="80" transform="rotate(135)"/>
      <line x1="0" y1="-220" x2="0" y2="220" transform="rotate(22.5)"/>
      <line x1="0" y1="-220" x2="0" y2="220" transform="rotate(67.5)"/>
      <line x1="0" y1="-220" x2="0" y2="220" transform="rotate(112.5)"/>
      <line x1="0" y1="-220" x2="0" y2="220" transform="rotate(157.5)"/>
    </g>
  </svg>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <script>
    // ── PETAL CANVAS: replaces 40 animated DOM divs ──────────────────────────
    // Runs entirely on canvas — zero extra layout/paint per frame
    ;(function () {
      const canvas = document.getElementById('petalCanvas');
      const ctx    = canvas.getContext('2d');
      const EMOJIS = ['🪷','🌸','🌺','🌻'];

      // Only 12 petals — visually same, but ~70% less work
      const PETALS = Array.from({ length: 12 }, (_, i) => ({
        emoji : EMOJIS[i % EMOJIS.length],
        x     : (i / 12) * window.innerWidth + Math.random() * 60 - 30,
        y     : -Math.random() * window.innerHeight * 0.5,
        size  : 12 + Math.random() * 14,
        speed : 0.6 + Math.random() * 0.8,
        drift : (Math.random() - 0.5) * 0.5,
        alpha : 0.7 + Math.random() * 0.3,
      }));

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize, { passive: true });

      let raf;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const p of PETALS) {
          ctx.globalAlpha = p.alpha;
          ctx.font = `${p.size}px serif`;
          ctx.fillText(p.emoji, p.x, p.y);
          p.y += p.speed;
          p.x += p.drift;
          if (p.y > canvas.height + 40) {
            p.y = -40;
            p.x = Math.random() * canvas.width;
          }
        }
        ctx.globalAlpha = 1;
        raf = requestAnimationFrame(draw);
      }
      draw();

      // ── PERFORMANCE: pause everything when tab is hidden ──────────────────
      const mandalas = document.querySelectorAll('.mandala, .mandala2');
      document.addEventListener('visibilitychange', () => {
        const state = document.hidden ? 'paused' : 'running';
        mandalas.forEach(el => el.style.animationPlayState = state);
        if (document.hidden) {
          cancelAnimationFrame(raf);
        } else {
          draw();
        }
      });

      // ── Dismiss splash after progress bar completes (2.3s) ───────────────
      const splash = document.getElementById('splash');
      setTimeout(() => {
        splash.style.transition = 'opacity 0.5s ease';
        splash.style.opacity    = '0';
        splash.style.pointerEvents = 'none';
        setTimeout(() => {
          splash.remove();
          cancelAnimationFrame(raf); // petals no longer needed
        }, 500);
      }, 2300);
    })();
  </script>
</body>
</html>
